name: SARAS CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    - name: Build Backend
      working-directory: ./saras-backend
      run: go build -v ./cmd/server/...
    - name: Test Backend
      working-directory: ./saras-backend
      run: go test -v ./...

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Install Frontend Dependencies
      working-directory: ./saras-frontend
      run: npm install
    - name: Build Frontend
      working-directory: ./saras-frontend
      run: npm run build
